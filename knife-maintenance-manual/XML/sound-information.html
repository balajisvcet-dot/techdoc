<div class="body conbody"><p class="shortdesc"></p>
<p class="p">The sound pressure resulting from Knife operation was
measured at 1 m (3.3 ft) from the Knife and found to be 85 dB(A)
under the following conditions: 160 MPM (523 FPM), 265 cm (104 in) web
width. Sound levels may vary slightly for other applications.</p>
